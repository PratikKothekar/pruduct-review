<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Inter', sans-serif;
        }

        body {
            background: #f5f7fc;
            color: #0f172a;
            padding: 1.5rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #232f3e, #ff9900);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            background: white;
            padding: 1rem 1.5rem;
            border-radius: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
        }

        .category-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .cat-btn {
            background: #e2e8f0;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .cat-btn.active {
            background: #1e293b;
            color: white;
        }

        .product-count {
            background: #eef2ff;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.9rem;
        }

        .reset-btn {
            background: #f1f5f9;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
        }

        .search-wrapper {
            position: relative;
            flex: 1;
            min-width: 220px;
            max-width: 400px;
        }

        .search-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 0.85rem;
            pointer-events: none;
            transition: color 0.2s;
        }

        .search-input {
            width: 100%;
            padding: 0.55rem 1rem 0.55rem 2.4rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 2rem;
            font-size: 0.85rem;
            font-family: inherit;
            outline: none;
            background: #f8fafc;
            transition: all 0.25s ease;
        }

        .search-input:focus {
            border-color: #3b82f6;
            background: white;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .search-input:focus + i {
            color: #3b82f6;
        }

        .search-input::placeholder {
            color: #94a3b8;
        }

        .search-clear {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1rem;
            cursor: pointer;
            padding: 0 4px;
            display: none;
            line-height: 1;
            transition: color 0.2s;
        }

        .search-clear:hover {
            color: #475569;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
            margin-bottom: 2rem;
        }

        .product-card {
            background: white;
            border-radius: 1.2rem;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            transition: 0.2s;
            border: 1px solid #eef2f6;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.15);
        }

        .product-img {
            height: 200px;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .product-card:hover .product-img img {
            transform: scale(1.05);
        }

        /* Image loading skeleton */
        .product-img::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            z-index: 0;
        }

        .product-img img {
            position: relative;
            z-index: 1;
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        .product-img img.loaded+.img-overlay {
            opacity: 0;
        }

        .product-info {
            padding: 1rem 1.2rem 1.2rem;
        }

        .product-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 2.6rem;
        }

        .rating {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            margin: 0.4rem 0;
        }

        .stars {
            color: #fbbf24;
            letter-spacing: 2px;
        }

        .buy-links {
            display: flex;
            gap: 0.6rem;
            margin: 0.8rem 0 0.5rem;
        }

        .amazon-link,
        .flipkart-link {
            flex: 1;
            text-align: center;
            padding: 0.4rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .amazon-link {
            background: #232f3e;
            color: white;
        }

        .flipkart-link {
            background: #2874f0;
            color: white;
        }

        .review-snippet {
            background: #f8fafc;
            padding: 0.4rem;
            border-radius: 0.8rem;
            font-size: 0.7rem;
            margin-top: 0.5rem;
            border-left: 3px solid #3b82f6;
        }

        .btn-review {
            background: #1e293b;
            color: white;
            border: none;
            width: 100%;
            padding: 0.5rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
            font-size: 0.8rem;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 2rem;
        }

        .page-btn {
            background: #e2e8f0;
            border: none;
            padding: 0.4rem 0.9rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .page-btn:hover:not(.disabled) {
            background: #cbd5e1;
        }

        .page-btn.active-page {
            background: #3b82f6;
            color: white;
        }

        .page-btn.page-nav {
            background: #1e293b;
            color: white;
            padding: 0.4rem 1.2rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .page-btn.page-nav:hover:not(.disabled) {
            background: #334155;
        }

        .page-btn.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            max-width: 560px;
            width: 95%;
            border-radius: 1.5rem;
            padding: 0;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .modal-header {
            padding: 1.2rem 1.5rem 0.8rem;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .modal-tabs {
            display: flex;
            gap: 0;
            background: #f1f5f9;
            border-radius: 2rem;
            padding: 3px;
            flex-shrink: 0;
            margin: 0.8rem 1.5rem;
        }

        .modal-tab {
            flex: 1;
            border: none;
            background: transparent;
            padding: 0.45rem 1rem;
            border-radius: 2rem;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            color: #64748b;
            transition: all 0.2s;
        }

        .modal-tab.active {
            background: white;
            color: #1e293b;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 0 1.5rem 1.5rem;
        }

        /* All Reviews panel */
        .reviews-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .review-card {
            background: #f8fafc;
            border-radius: 1rem;
            padding: 0.9rem 1rem;
            border-left: 3px solid #3b82f6;
        }

        .review-card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.3rem;
        }

        .review-card-name {
            font-weight: 700;
            font-size: 0.85rem;
            color: #1e293b;
        }

        .review-card-stars {
            color: #fbbf24;
            font-size: 0.85rem;
        }

        .review-card-comment {
            font-size: 0.82rem;
            color: #475569;
            line-height: 1.5;
        }

        .review-card-date {
            font-size: 0.68rem;
            color: #94a3b8;
            margin-top: 0.3rem;
        }

        .reviews-summary {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            background: linear-gradient(135deg, #1e293b, #334155);
            color: white;
            border-radius: 1rem;
            padding: 1rem 1.2rem;
            margin-bottom: 1rem;
        }

        .reviews-avg-big {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1;
        }

        .reviews-avg-stars {
            color: #fbbf24;
            font-size: 1rem;
            letter-spacing: 2px;
        }

        .reviews-total {
            font-size: 0.78rem;
            opacity: 0.7;
            margin-top: 0.2rem;
        }

        .rating-bars {
            flex: 1;
        }

        .rating-bar-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.2rem;
            font-size: 0.72rem;
        }

        .rating-bar-label {
            width: 30px;
            text-align: right;
            opacity: 0.8;
        }

        .rating-bar-track {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            overflow: hidden;
        }

        .rating-bar-fill {
            height: 100%;
            background: #fbbf24;
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .no-reviews-msg {
            text-align: center;
            color: #94a3b8;
            padding: 2rem 0;
            font-size: 0.9rem;
        }

        .write-review-panel {
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.3rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.6rem 0.9rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 0.8rem;
            font-size: 0.85rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #3b82f6;
        }

        .star-rating-input {
            display: flex;
            gap: 0.4rem;
            font-size: 1.8rem;
            cursor: pointer;
        }

        .star-rating-input i {
            color: #cbd5e1;
        }

        .star-rating-input i.selected-star,
        .star-rating-input i.hover-star {
            color: #fbbf24;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #e2e8f0;
            font-size: 0.7rem;
        }

        @media (max-width: 700px) {
            body {
                padding: 1rem;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1><i class="fab fa-amazon"></i> + <i class="fas fa-shopping-cart"></i> MegaGadgetReviews</h1>
            <p>500+ smartphones, TVs, audio, wearables, cameras, gaming gear | Prices in ₹ (Indian Rupees)</p>
        </header>

        <div class="controls">
            <div class="category-filter" id="categoryFilter">
                <!-- Buttons will be generated dynamically with counts -->
            </div>
            <div class="search-wrapper">
                <input type="text" class="search-input" id="searchInput" placeholder="Search products..." autocomplete="off">
                <i class="fas fa-search"></i>
                <button class="search-clear" id="searchClear" title="Clear search">&times;</button>
            </div>
            <div class="product-count" id="productCount">0 products</div>
            <button id="resetReviewsBtn" class="reset-btn"><i class="fas fa-undo-alt"></i> Reset reviews</button>
        </div>

        <div id="productGrid" class="product-grid"></div>
        <div id="pagination" class="pagination"></div>
        <footer>⭐ Each card shows a real product image · Amazon & Flipkart links search for the product · Add your own
            review (saved locally) · All prices in Indian Rupees (₹)</footer>
    </div>

    <div id="reviewModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalProductTitle"
                    style="font-size:0.95rem; max-width:80%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
                    Reviews</h3>
                <span class="close-modal" style="font-size:1.8rem; cursor:pointer; color:#94a3b8;">&times;</span>
            </div>
            <div class="modal-tabs">
                <button class="modal-tab active" id="tabAllReviews" onclick="switchTab('all')">📋 All Reviews</button>
                <button class="modal-tab" id="tabWriteReview" onclick="switchTab('write')">✍️ Write a Review</button>
            </div>
            <div class="modal-body">
                <!-- ALL REVIEWS PANEL -->
                <div id="panelAllReviews">
                    <div id="reviewsSummaryBox" class="reviews-summary"></div>
                    <div id="reviewsList" class="reviews-list"></div>
                </div>
                <!-- WRITE REVIEW PANEL -->
                <div id="panelWriteReview" style="display:none;">
                    <form id="reviewForm" class="write-review-panel">
                        <div class="form-group">
                            <label>Your name</label>
                            <input type="text" id="reviewerName" value="Anonymous">
                        </div>
                        <div class="form-group">
                            <label>Your rating</label>
                            <div class="star-rating-input" id="starRatingWidget">
                                <i class="far fa-star" data-value="1"></i>
                                <i class="far fa-star" data-value="2"></i>
                                <i class="far fa-star" data-value="3"></i>
                                <i class="far fa-star" data-value="4"></i>
                                <i class="far fa-star" data-value="5"></i>
                            </div>
                            <input type="hidden" id="selectedRating" value="0">
                        </div>
                        <div class="form-group">
                            <label>Your review</label>
                            <textarea id="reviewComment" rows="4"
                                placeholder="Share your experience with this product..." required></textarea>
                        </div>
                        <button type="submit"
                            style="background:#3b82f6; width:100%; padding:0.75rem; border:none; border-radius:2rem; color:white; font-weight:700; cursor:pointer; font-size:0.9rem;">Submit
                            Review</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

            const sum = product.reviews.reduce((s, r) => s + r.rating, 0);
            return { avg: sum / total, total: total };

        function renderStars(rating) {
            const full = Math.floor(rating);
            const half = rating % 1 >= 0.5;
            let stars = "";
            for (let i = 1; i <= 5; i++) {
                if (i <= full) stars += "★";
                else if (half && i === full + 1) stars += "½";
                else stars += "☆";
            }
            return stars;
        }

        function getReviewSnippets(product) {
            if (!product.reviews.length) return '<div class="review-snippet">✨ No reviews yet. Be the first!</div>';

            const extra = product.reviews.length > 2 ? `<div style="font-size:0.7rem; color:#3b82f6; margin-top:0.3rem; font-weight:600;">+${product.reviews.length - 2} more reviews — click to view all</div>` : '';

            if (start > 1) {
                html += `<button class="page-btn" data-page="1">1</button>`;
                if (start > 2) html += `<span>...</span>`;
            }

            // Middle pages
            for (let i = start; i <= end; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active-page' : ''}" 
                    data-page="${i}">${i}</button>`;
            }

            // Last page always show
            if (end < totalPages) {
                if (end < totalPages - 1) html += `<span>...</span>`;
                html += `<button class="page-btn" data-page="${totalPages}">${totalPages}</button>`;
            }

            // Next button
            html += `<button class="page-btn page-nav ${currentPage === totalPages ? 'disabled' : ''}" 
                data-page="next" ${currentPage === totalPages ? 'disabled' : ''}>
                Next
            </button>`;

            container.innerHTML = html;

            // Click events
            document.querySelectorAll('.page-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const page = btn.getAttribute('data-page');

                    if (page === 'prev' && currentPage > 1) currentPage--;
                    else if (page === 'next' && currentPage < totalPages) currentPage++;
                    else currentPage = parseInt(page);

                    renderProducts();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
            });
        }

        let currentProductForReview = null;
        let currentRating = 0;

        // ---- TAB SWITCHING ----
        function switchTab(tab) {
            const allBtn = document.getElementById("tabAllReviews");
            const writeBtn = document.getElementById("tabWriteReview");
            const allPanel = document.getElementById("panelAllReviews");
            const writePanel = document.getElementById("panelWriteReview");
            if (tab === 'all') {
                allBtn.classList.add('active'); writeBtn.classList.remove('active');
                allPanel.style.display = ''; writePanel.style.display = 'none';
            } else {
                writeBtn.classList.add('active'); allBtn.classList.remove('active');
                writePanel.style.display = ''; allPanel.style.display = 'none';
            }
        }

        // ---- RENDER ALL REVIEWS PANEL ----
        function renderReviewsPanel(product) {
            const reviews = product.reviews;
            const stats = getProductStats(product);

            // Summary box
            const countPerStar = [5, 4, 3, 2, 1].map(s => ({
                star: s,
                count: reviews.filter(r => Math.round(r.rating) === s).length
            }));
            const summaryBox = document.getElementById("reviewsSummaryBox");
            summaryBox.innerHTML = `
            <div style="text-align:center;">
                <div class="reviews-avg-big">${stats.avg.toFixed(1)}</div>
                <div class="reviews-avg-stars">${renderStars(stats.avg)}</div>
                <div class="reviews-total">${stats.total} review${stats.total !== 1 ? 's' : ''}</div>
            </div>
            <div class="rating-bars">
                ${countPerStar.map(row => `
                    <div class="rating-bar-row">
                        <span class="rating-bar-label">${row.star}★</span>
                        <div class="rating-bar-track">
                            <div class="rating-bar-fill" style="width:${stats.total ? Math.round(row.count / stats.total * 100) : 0}%"></div>
                        </div>
                        <span style="opacity:0.7; font-size:0.72rem; min-width:20px;">${row.count}</span>
                    </div>
                `).join('')}
            </div>
        `;

            // Reviews list
            const listEl = document.getElementById("reviewsList");
            if (!reviews.length) {
                listEl.innerHTML = `<div class="no-reviews-msg">✨ No reviews yet. Be the first to review!</div>`;
                return;
            }
            listEl.innerHTML = [...reviews].reverse().map(rev => `
            <div class="review-card">
                <div class="review-card-top">
                    <span class="review-card-name">👤 ${escapeHtml(rev.name)}</span>
                    <span class="review-card-stars">${'★'.repeat(Math.round(rev.rating))}${'☆'.repeat(5 - Math.round(rev.rating))} <span style="color:#1e293b; font-weight:700;">${rev.rating.toFixed(1)}</span></span>
                </div>
                <div class="review-card-comment">${escapeHtml(rev.comment)}</div>
                <div class="review-card-date">🕐 ${rev.date || 'Recently'}</div>
            </div>
        `).join('');
        }

        function openReviewModal(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            currentProductForReview = product;
            document.getElementById("modalProductTitle").textContent = product.name;
            document.getElementById("reviewerName").value = "Anonymous";
            document.getElementById("reviewComment").value = "";
            document.getElementById("selectedRating").value = "0";
            currentRating = 0;
            document.querySelectorAll("#starRatingWidget i").forEach(star => {
                star.classList.remove("fas", "selected-star");
                star.classList.add("far");
            });
            switchTab('all');
            renderReviewsPanel(product);
            document.getElementById("reviewModal").style.display = "flex";
        }

        function setupStarWidget() {
            const container = document.getElementById("starRatingWidget");
            if (!container) return;
            const stars = container.querySelectorAll("i");
            function updateStars(value) {
                stars.forEach(star => {
                    const val = parseInt(star.getAttribute("data-value"));
                    if (val <= value) {
                        star.classList.remove("far");
                        star.classList.add("fas", "selected-star");
                    } else {
                        star.classList.remove("fas", "selected-star");
                        star.classList.add("far");
                    }
                });
                document.getElementById("selectedRating").value = value;
                currentRating = value;
            }
            stars.forEach(star => {
                star.addEventListener("mouseenter", () => {
                    const val = parseInt(star.getAttribute("data-value"));
                    stars.forEach(s => {
                        const sVal = parseInt(s.getAttribute("data-value"));
                        if (sVal <= val) { s.classList.remove("far"); s.classList.add("fas", "hover-star"); }
                        else { s.classList.remove("fas", "hover-star"); s.classList.add("far"); }
                    });
                });
                container.addEventListener("mouseleave", () => {
                    stars.forEach(s => {
                        s.classList.remove("hover-star");
                        const sVal = parseInt(s.getAttribute("data-value"));
                        if (currentRating > 0 && sVal <= currentRating) { s.classList.remove("far"); s.classList.add("fas", "selected-star"); }
                        else { s.classList.remove("fas", "selected-star"); s.classList.add("far"); }
                    });
                });
                star.addEventListener("click", () => updateStars(parseInt(star.getAttribute("data-value"))));
            });
        }

        function addReviewToProduct(product, userName, ratingVal, comment) {
            if (!comment.trim()) { alert("Please write a review."); return false; }
            if (ratingVal < 0.5 || ratingVal > 5) { alert("Select rating stars."); return false; }
            product.reviews.push({
                id: Date.now() + Math.random(),
                name: userName.trim() || "Anonymous",
                rating: ratingVal,
                comment: comment.trim(),
                date: "Just now"
            });
            saveProducts();
            renderProducts();
            return true;
        }

        function resetAllReviews() {
            if (confirm("⚠️ Reset all reviews to default? Your added reviews will be lost.")) {
                products = JSON.parse(JSON.stringify(allProducts));
                saveProducts();
                renderProducts();
            }
        }

        function closeModal() {
            document.getElementById("reviewModal").style.display = "none";
            currentProductForReview = null;
        }

        // Generate category filter buttons with counts
        function renderCategoryButtons() {
            const categoryIcons = {
                Smartphones: '📱',
                TVs: '📺',
                Audio: '🎧',
                Wearables: '⌚',
                Cameras: '📷',
                Gaming: '🎮'
            };
            const filterContainer = document.getElementById('categoryFilter');
            const totalCount = products.length;
            let html = `<button class="cat-btn ${currentCategory === 'all' ? 'active' : ''}" data-cat="all">All (${totalCount})</button>`;
            for (const cat of Object.keys(productLists)) {
                const count = products.filter(p => p.category === cat).length;
                const icon = categoryIcons[cat] || '';
                html += `<button class="cat-btn ${currentCategory === cat ? 'active' : ''}" data-cat="${cat}">${icon} ${cat} (${count})</button>`;
            }
            filterContainer.innerHTML = html;

            // Re-attach click events
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategory = btn.getAttribute('data-cat');
                    currentPage = 1;
                    renderProducts();
                });
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            loadProducts();
            renderCategoryButtons();
            renderProducts();
            setupStarWidget();

            // --- Search setup ---
            const searchInput = document.getElementById("searchInput");
            const searchClear = document.getElementById("searchClear");

            searchInput.addEventListener("input", () => {
                clearTimeout(searchDebounceTimer);
                searchDebounceTimer = setTimeout(() => {
                    currentSearch = searchInput.value;
                    currentPage = 1;
                    renderProducts();
                    // Show/hide clear button
                    searchClear.style.display = currentSearch.trim() ? 'block' : 'none';
                }, 300);
            });

            searchClear.addEventListener("click", () => {
                searchInput.value = "";
                currentSearch = "";
                currentPage = 1;
                searchClear.style.display = 'none';
                searchInput.focus();
                renderProducts();
            });

            const modal = document.getElementById("reviewModal");
            document.querySelector(".close-modal").addEventListener("click", closeModal);
            window.addEventListener("click", (e) => { if (e.target === modal) closeModal(); });

            document.getElementById("reviewForm").addEventListener("submit", (e) => {
                e.preventDefault();
                if (!currentProductForReview) { closeModal(); return; }
                const name = document.getElementById("reviewerName").value;
                const rating = parseFloat(document.getElementById("selectedRating").value);
                const comment = document.getElementById("reviewComment").value;
                if (addReviewToProduct(currentProductForReview, name, rating, comment)) {
                    document.getElementById("reviewForm").reset();
                    document.getElementById("selectedRating").value = "0";
                    currentRating = 0;
                    document.querySelectorAll("#starRatingWidget i").forEach(s => { s.classList.remove("fas", "selected-star"); s.classList.add("far"); });
                    // Switch to All Reviews tab to show the new review
                    switchTab('all');
                    renderReviewsPanel(currentProductForReview);
                }
            });

            document.getElementById("resetReviewsBtn").addEventListener("click", resetAllReviews);
        });
    </script>
</body>
